name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # release-please inspects all commits on main since the last release,
  # computes the next semantic version from Conventional Commit types,
  # and creates or updates a Release PR.
  #
  # When the Release PR is merged, release-please:
  #   1. Creates a GitHub Release with the computed version tag (vX.Y.Z).
  #   2. Updates CHANGELOG.md with the categorised commit list.
  #   3. Bumps the version field in package.json.
  # ---------------------------------------------------------------------------
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json
          token: ${{ secrets.GITHUB_TOKEN }}
