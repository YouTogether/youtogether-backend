name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # release-please inspects all commits on main since the last release,
  # computes the next semantic version from Conventional Commit types,
  # and creates or updates a Release PR.
  #
  # When the Release PR is merged, release-please:
  #   1. Creates a GitHub Release with the computed version tag (vX.Y.Z).
  #   2. Updates CHANGELOG.md with the categorised commit list.
  #   3. Bumps the version field in package.json.
  # ---------------------------------------------------------------------------
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Optional post-release job.
  # Runs only when the Release PR has been merged and a new tag is created.
  # Extend this job to trigger deployment to a staging environment.
  # ---------------------------------------------------------------------------
  post-release:
    name: Post-release
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Checkout repository at release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Attach build artefact to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: dist/**