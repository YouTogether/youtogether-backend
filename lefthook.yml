# lefthook.yml — youtogether-backend
#
# Git hooks manager configuration for the NestJS backend repository.
# Install hooks by running: lefthook install
#
# lefthook is preferred over husky for consistency with the frontend
# repository, which uses the Flutter toolchain without Node.js.

# ---------------------------------------------------------------------------
# commit-msg
# Validates the commit message against the Conventional Commits 1.0.0
# specification before the commit is accepted.
# ---------------------------------------------------------------------------
commit-msg:
  commands:
    validate-conventional-commit:
      run: bash .githooks/scripts/validate-commit-msg.sh {1}

# ---------------------------------------------------------------------------
# pre-commit
# Runs ESLint on staged files only (fast feedback during development).
# Full lint runs on all files are performed by the CI pipeline.
# ---------------------------------------------------------------------------
pre-commit:
  commands:
    lint-staged:
      glob: "*.{ts,js}"
      run: npx eslint {staged_files} --max-warnings=0

# ---------------------------------------------------------------------------
# pre-push
# Validates the current branch name against the project naming convention.
# ---------------------------------------------------------------------------
pre-push:
  commands:
    validate-branch-name:
      run: bash .githooks/scripts/validate-branch-name.sh